<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Enterprise blue border, white background -->
  <circle cx="16" cy="16" r="15" fill="#ffffff" stroke="#1A73E8" stroke-width="2"/>

  <!-- Drumstick bone handle (diagonal, bottom-left to top-right) -->
  <line x1="10.5" y1="22.5" x2="21.5" y2="11.5"
        stroke="#EA4335" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Meat bulge (top-right) — primary meat mass -->
  <circle cx="21.5" cy="11.5" r="5.5" fill="#EA4335"/>

  <!-- Bone cap (bottom-left) — knuckle end -->
  <circle cx="10.5" cy="22.5" r="2.5" fill="#EA4335"/>

  <!-- Subtle inner highlight on meat for flat depth -->
  <circle cx="20" cy="9.5" r="1.8" fill="#f06f63" opacity="0.55"/>
</svg>
